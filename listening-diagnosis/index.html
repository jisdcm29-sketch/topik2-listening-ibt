<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOPIK II 듣기 진단 보고서</title>
  <style>
    :root {
      --blue: #1a73e8;
      --deep: #003f7f;
      --light: #eef6ff;
      --line: #d6e2f0;
      --text: #052b55;
      --red: #e83f5b;
      --pink: #ffe8ef;
      --green: #0a8a3a;
      --gray: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: #f3f6fb;
      color: var(--text);
    }

    header {
      background: var(--blue);
      color: #fff;
      text-align: center;
      padding: 42px 20px 34px;
    }

    header h1 {
      margin: 0 0 12px;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    header p {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .toolbar {
      max-width: 1160px;
      margin: 26px auto 12px;
      padding: 0 18px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 13px 24px;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      background: var(--blue);
      color: #fff;
      box-shadow: 0 8px 18px rgba(26, 115, 232, .18);
    }

    button.secondary {
      background: var(--red);
      box-shadow: 0 8px 18px rgba(232, 63, 91, .18);
    }

    button.ghost {
      background: #fff;
      color: var(--deep);
      border: 1px solid #9fc8ff;
      box-shadow: none;
    }

    main.report-paper {
      max-width: 1120px;
      margin: 0 auto 60px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 34px 42px 44px;
      box-shadow: 0 18px 44px rgba(3, 43, 84, .08);
    }

    .loading-box,
    .no-result {
      max-width: 860px;
      margin: 40px auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 24px;
      font-size: 18px;
      line-height: 1.8;
    }

    .report-title {
      font-size: 34px;
      margin: 6px 0 10px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .report-subtitle {
      margin: 0 0 22px;
      color: #55708c;
      font-size: 17px;
      font-weight: 700;
    }

    .blue-rule {
      height: 5px;
      background: var(--blue);
      margin: 0 0 22px;
      border-radius: 99px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 15px 16px;
      min-height: 84px;
      background: #fbfdff;
    }

    .summary-card .label {
      color: #526a84;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 900;
      color: var(--deep);
      word-break: break-word;
    }

    .level-box {
      border: 3px solid var(--blue);
      border-radius: 12px;
      background: #eaf5ff;
      padding: 20px 24px;
      margin: 20px 0;
    }

    .level-box h2 {
      margin: 0 0 14px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .level-box p {
      margin: 7px 0;
      font-size: 16px;
      line-height: 1.55;
    }

    .notice-box {
      border-left: 6px solid #d97706;
      background: #fff8ed;
      border-radius: 10px;
      padding: 18px 20px;
      margin: 18px 0 26px;
      line-height: 1.7;
    }


    .review-progress-box {
      border: 2px solid #9fc8ff;
      border-radius: 14px;
      background: #f4f9ff;
      padding: 18px 20px;
      margin: 20px 0 26px;
    }

    .review-progress-title {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 900;
      color: var(--deep);
      font-size: 20px;
    }

    .review-progress-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 12px 0;
    }

    .review-progress-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      min-height: 76px;
    }

    .review-progress-card .label {
      font-size: 13px;
      font-weight: 800;
      color: #526a84;
      margin-bottom: 7px;
    }

    .review-progress-card .value {
      font-size: 24px;
      font-weight: 900;
      color: var(--deep);
      line-height: 1.15;
    }

    .review-progress-note {
      font-size: 14px;
      line-height: 1.65;
      color: #34506c;
      margin-top: 10px;
    }

    .review-progress-list {
      font-size: 14px;
      line-height: 1.65;
      color: #34506c;
      margin-top: 8px;
    }

    .resolved-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #e8fff0;
      color: #087a32;
      font-size: 12px;
      font-weight: 900;
      vertical-align: middle;
    }

    .section-title {
      margin: 30px 0 14px;
      padding-left: 14px;
      border-left: 6px solid var(--blue);
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0 18px;
      font-size: 15px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: top;
    }

    th {
      background: #e9f3ff;
      color: var(--deep);
      font-weight: 900;
      text-align: left;
    }

    .graph-list {
      display: grid;
      gap: 12px;
    }

    .graph-row {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
    }

    .graph-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-weight: 900;
      font-size: 15px;
    }

    .bar {
      height: 11px;
      background: #e6eef8;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #ef5c75, #1a73e8);
      width: 0%;
      border-radius: 99px;
    }

    .graph-detail {
      text-align: right;
      font-size: 13px;
      margin-top: 6px;
      color: #45617e;
      font-weight: 700;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .pill-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--pink);
      color: #b91c3a;
      padding: 9px 13px;
      font-size: 14px;
      font-weight: 900;
    }

    .study-box {
      background: #edf7ff;
      border-left: 6px solid var(--blue);
      border-radius: 10px;
      padding: 18px 20px;
      line-height: 1.8;
      margin: 16px 0;
    }

    .wrong-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .wrong-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      background: #fff;
      line-height: 1.65;
      font-size: 14px;
    }

    .wrong-card strong {
      color: var(--deep);
      font-size: 16px;
    }

    .wrong-card .answer-line {
      color: #c02643;
      font-weight: 800;
    }

    .wrong-card .correct-line {
      color: #0a7a32;
      font-weight: 800;
    }

    .hidden {
      display: none !important;
    }

    input[type="file"] {
      font-size: 14px;
    }

    @media (max-width: 900px) {
      main.report-paper {
        margin: 0 14px 40px;
        padding: 26px 18px 34px;
      }

      .summary-grid,
      .two-col,
      .review-progress-grid,
      .wrong-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: center;
        flex-wrap: wrap;
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 12mm;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      html,
      body {
        width: 100%;
        background: #fff !important;
      }

      header,
      .toolbar,
      .no-print {
        display: none !important;
      }

      main.report-paper {
        box-shadow: none !important;
        border: 0 !important;
        border-radius: 0 !important;
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }

      .summary-grid {
        display: grid !important;
        grid-template-columns: repeat(5, 1fr) !important;
        gap: 10px !important;
      }

      .summary-card {
        min-height: 72px !important;
        padding: 12px 14px !important;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .summary-card .value {
        font-size: 20px !important;
      }

      .two-col {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
      }

      .wrong-grid {
        display: grid !important;
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        gap: 10px !important;
      }

      .graph-row,
      .wrong-card,
      .study-box,
      .level-box,
      .notice-box,
      table {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .bar > span {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

  
    .review-progress-box {
      border: 2px solid #9fc8ff;
      border-radius: 14px;
      background: #f4f9ff;
      padding: 18px 20px;
      margin: 20px 0 26px;
    }

    .review-progress-title {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 900;
      color: var(--deep);
      font-size: 20px;
    }

    .review-progress-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 12px 0;
    }

    .review-progress-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      min-height: 76px;
    }

    .review-progress-card .label {
      font-size: 13px;
      font-weight: 800;
      color: #526a84;
      margin-bottom: 7px;
    }

    .review-progress-card .value {
      font-size: 24px;
      font-weight: 900;
      color: var(--deep);
      line-height: 1.15;
    }

    .review-progress-note {
      font-size: 14px;
      line-height: 1.65;
      color: #34506c;
      margin-top: 10px;
    }

    .review-progress-list {
      font-size: 14px;
      line-height: 1.65;
      color: #34506c;
      margin-top: 8px;
    }

    .resolved-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #e8fff0;
      color: #087a32;
      font-size: 12px;
      font-weight: 900;
      vertical-align: middle;
    }

    .section-title {
        break-after: avoid;
        page-break-after: avoid;
      }

      button {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>TOPIK II 듣기 진단 보고서</h1>
    <p>Listening Diagnosis · 예상 수준 · 약점 분석 · 학습 처방</p>
  </header>

  <div class="toolbar no-print">
    <button id="printBtn" type="button">PDF로 인쇄 / 저장</button>
    <button id="wrongReviewBtn" class="secondary" type="button">오답 다시 풀기</button>
  </div>

  <main id="report" class="report-paper">
    <div class="loading-box">결과를 불러오는 중입니다.</div>
  </main>

  <script>
    (function () {
      "use strict";

      const WRONG_REVIEW_SCOPE_VERSION = "topik2_wrong_review_current_result_v5";
      const WRONG_REVIEW_EMPTY_PROGRESS = (sourceId) => ({
        scopeVersion: WRONG_REVIEW_SCOPE_VERSION,
        currentResultOnly: true,
        sourceId: sourceId || "",
        resolvedKeys: [],
        solvedNumbers: [],
        attempts: []
      });

      const REPORT_KEYS = [
        "topik2_listening_last_result",
        "topik2_listening_result",
        "topik2_listening_last_result_json",
        "topik2_last_result_json",
        "topik2ListeningLastResult",
        "topik2_result",
        "lastResult"
      ];

      const AREA_LABELS = {
        visual_graph_choice: "그림·그래프 고르기",
        following_response: "이어질 말 고르기",
        next_action: "이어서 할 행동 고르기",
        same_content_single: "들은 내용 일치(단일)",
        main_thought_single: "중심 생각(단일)",
        main_thought_set: "중심 생각(세트)",
        speaker_action_intention: "행동·의도 파악",
        speaker_identity: "화자 신분 파악",
        topic_content: "주제·내용 파악",
        attitude_method: "태도·말하는 방식",
        same_content_set: "들은 내용 일치(세트)",
        unknown: "기타"
      };

      const REVIEW_METHODS = {
        visual_graph_choice: "그림의 인물·행동·위치 또는 그래프 제목과 수치를 먼저 보고 들은 내용과 대조하세요.",
        following_response: "마지막 말의 의도와 의문사를 먼저 잡고 자연스러운 다음 말을 고르세요.",
        next_action: "대화가 끝난 직후 여자가 무엇을 먼저 할지 행동 동사를 표시하며 들으세요.",
        same_content_single: "선택지의 핵심 명사·숫자·장소를 표시하고, 들은 내용과 같은 것만 남기세요.",
        main_thought_single: "남자의 핵심 주장과 이유 표현을 구분해서 중심 생각을 찾으세요.",
        main_thought_set: "긴 대화의 반복되는 주장과 결론 표현을 중심으로 남자의 생각을 확인하세요.",
        speaker_action_intention: "화자가 지금 하고 있는 행동, 부탁·설명·비판·안내 의도를 구분하세요.",
        speaker_identity: "화자의 역할, 업무, 말하는 대상과 사용하는 표현을 근거로 신분을 추론하세요.",
        topic_content: "담화의 제목이 될 만한 핵심어를 먼저 잡고 세부 내용과 연결하세요.",
        attitude_method: "평가·우려·강조·비판 같은 태도 표현과 설명 방식 표현을 구분하세요.",
        same_content_set: "긴 담화의 세부 내용을 인물, 이유, 결과, 조건으로 나누어 메모하세요.",
        unknown: "오답 문항의 정답 근거가 되는 표현을 다시 듣고 한 문장으로 정리하세요."
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function formatDate(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.getFullYear() + ". " + (date.getMonth() + 1) + ". " + date.getDate() + ". " +
          (date.getHours() >= 12 ? "오후 " : "오전 ") +
          ((date.getHours() % 12) || 12) + ":" + pad2(date.getMinutes()) + ":" + pad2(date.getSeconds());
      }

      function normalizeItems(result) {
        const raw = Array.isArray(result.items) ? result.items : [];
        const out = [];
        raw.forEach((entry) => {
          if (entry && Array.isArray(entry.items)) {
            entry.items.forEach((item) => {
              out.push({
                ...item,
                set_id: item.set_id || entry.set_id || "",
                audio_url: item.audio_url || entry.audio_url || "",
                source_round: item.source_round || entry.source_round || result.generated_exam_round || ""
              });
            });
          } else if (entry) {
            out.push(entry);
          }
        });
        return out.sort((a, b) => Number(a.question_number || 0) - Number(b.question_number || 0));
      }

      function optionText(options, answer) {
        if (!answer) return "미응답";
        const key = String(answer);
        const list = Array.isArray(options) ? options : [];
        const found = list.find((opt, idx) => {
          if (typeof opt === "object" && opt !== null) {
            return String(opt.number ?? opt.value ?? opt.id ?? (idx + 1)) === key;
          }
          return String(idx + 1) === key;
        });
        if (!found) return key;
        if (typeof found === "object") {
          return key + ". " + (found.text || found.label || found.content || found.value || "");
        }
        return key + ". " + found;
      }

      function fallbackArea(qn) {
        const n = Number(qn || 0);
        if (n >= 1 && n <= 3) return "visual_graph_choice";
        if (n >= 4 && n <= 8) return "following_response";
        if (n >= 9 && n <= 12) return "next_action";
        if (n >= 13 && n <= 16) return "same_content_single";
        if (n >= 17 && n <= 20) return "main_thought_single";
        if ([21,25,31,37].includes(n)) return "main_thought_set";
        if ([23,27,35].includes(n)) return "speaker_action_intention";
        if (n === 29) return "speaker_identity";
        if ([33,41,43].includes(n)) return "topic_content";
        if ([32,46,48,50].includes(n)) return "attitude_method";
        if (n >= 21 && n <= 50) return "same_content_set";
        return "unknown";
      }

      function itemArea(item) {
        const raw = item.diagnostic_area || item.category || item.type || "";
        if (AREA_LABELS[raw]) return raw;
        return fallbackArea(item.question_number);
      }

      function areaOrder(area) {
        const order = [
          "visual_graph_choice",
          "following_response",
          "next_action",
          "same_content_single",
          "main_thought_single",
          "main_thought_set",
          "speaker_action_intention",
          "speaker_identity",
          "topic_content",
          "attitude_method",
          "same_content_set",
          "unknown"
        ];
        const idx = order.indexOf(area);
        return idx === -1 ? 99 : idx;
      }

      function makeStats(result) {
        const items = normalizeItems(result);
        const computedTotal = items.reduce((sum, item) => sum + Number(item.points || 0), 0);
        const computedEarned = items.reduce((sum, item) => sum + Number(item.earned_points || (item.is_correct ? item.points || 0 : 0)), 0);
        const correctCount = Number.isFinite(Number(result.correct_count)) ? Number(result.correct_count) : items.filter((item) => item.is_correct).length;
        const unansweredCount = Number.isFinite(Number(result.unanswered_count))
          ? Number(result.unanswered_count)
          : items.filter((item) => !item.student_answer).length;
        const totalPossible = Number(result.total_possible_points || computedTotal || 100);
        const earned = Number(result.earned_points ?? computedEarned ?? 0);
        const score100 = Number(result.section_score_100 ?? (totalPossible ? Math.round((earned / totalPossible) * 1000) / 10 : 0));
        return {
          items,
          totalQuestions: Number(result.total_questions || items.length || 0),
          correctCount,
          unansweredCount,
          wrongCount: Number(result.wrong_count ?? Math.max(0, items.length - correctCount)),
          totalPossible,
          earned,
          score100
        };
      }

      function levelByScore(score) {
        if (score >= 85) {
          return {
            title: "TOPIK II 듣기 고급 안정 단계",
            range: "85~100점",
            expected: "고급 담화 이해 안정권",
            stable: "복잡한 담화의 태도·방식·추론 문항까지 안정적으로 접근 가능",
            goal: "오답 근거 표현 정리와 고난도 세트 문항 속도 향상"
          };
        }
        if (score >= 70) {
          return {
            title: "TOPIK II 듣기 고급 전환 단계",
            range: "70~84점",
            expected: "고급 듣기 진입 단계",
            stable: "전문 담화의 주제와 세부 내용은 이해하나 태도·방식 문항 보완 필요",
            goal: "31~50번 전문 담화 세트의 태도·방식·추론 집중 복습"
          };
        }
        if (score >= 50) {
          return {
            title: "TOPIK II 듣기 중급 안정화 단계",
            range: "50~69점",
            expected: "중급 대화·담화 이해 가능 단계",
            stable: "일상 대화와 단일 문항은 가능하나 긴 담화 세트에서 실점 가능",
            goal: "21~50번 세트 문항의 핵심어 메모와 내용 일치 훈련"
          };
        }
        if (score >= 30) {
          return {
            title: "TOPIK II 듣기 중급 진입 준비 단계",
            range: "30~49점",
            expected: "기본 대화 이해 후 세부 내용 보완 단계",
            stable: "1~20번 단일 문항 안정화가 우선",
            goal: "4~20번 짧은 대화의 응답·행동·내용 일치 유형 복습"
          };
        }
        return {
          title: "TOPIK II 듣기 기초 보완 필요",
          range: "0~29점",
          expected: "기초 듣기 표현 보완 단계",
          stable: "TOPIK II 듣기 안정권 진입 전 준비 단계",
          goal: "1~20번 단일 문항부터 핵심 표현과 보기 분석을 안정화"
        };
      }

      function groupStats(items) {
        const map = new Map();
        items.forEach((item) => {
          const area = itemArea(item);
          if (!map.has(area)) {
            map.set(area, {
              area,
              label: AREA_LABELS[area] || area,
              items: [],
              possible: 0,
              earned: 0,
              correct: 0,
              wrongOrBlank: []
            });
          }
          const g = map.get(area);
          const points = Number(item.points || 0);
          const earned = Number(item.earned_points || (item.is_correct ? points : 0));
          g.items.push(item);
          g.possible += points;
          g.earned += earned;
          if (item.is_correct) g.correct += 1;
          if (!item.is_correct) g.wrongOrBlank.push(item);
        });

        return Array.from(map.values()).sort((a, b) => areaOrder(a.area) - areaOrder(b.area));
      }

      function percent(earned, possible, fallbackCount, totalCount) {
        if (possible > 0) return Math.round((earned / possible) * 100);
        if (totalCount > 0) return Math.round((fallbackCount / totalCount) * 100);
        return 0;
      }

      function renderGraph(groups) {
        return groups.map((g) => {
          const pct = percent(g.earned, g.possible, g.correct, g.items.length);
          return `
            <div class="graph-row">
              <div class="graph-meta">
                <span>${escapeHtml(g.label)}</span>
                <span>${pct}%</span>
              </div>
              <div class="bar"><span style="width:${Math.max(0, Math.min(100, pct))}%"></span></div>
              <div class="graph-detail">점수 ${g.earned} / ${g.possible || "-"} · 정답 ${g.correct} / ${g.items.length}문항</div>
            </div>
          `;
        }).join("");
      }

      function weakGroups(groups) {
        return groups
          .filter((g) => g.items.length > 0)
          .map((g) => ({ ...g, pct: percent(g.earned, g.possible, g.correct, g.items.length) }))
          .sort((a, b) => a.pct - b.pct || b.wrongOrBlank.length - a.wrongOrBlank.length)
          .slice(0, 3);
      }

      function renderPriority(groups) {
        const weak = weakGroups(groups);
        if (!weak.length) return "<p>분석할 문항이 없습니다.</p>";
        return weak.map((g, idx) => {
          const nums = g.wrongOrBlank.map((item) => item.question_number).join(", ") || "없음";
          return `
            <p><strong>${idx + 1}순위 · ${escapeHtml(g.label)}</strong><br>
            현재 결과: ${g.correct} / ${g.items.length}문항 정답, ${g.earned} / ${g.possible || "-"}점, 정답률 ${g.pct}%<br>
            복습할 문항: ${escapeHtml(nums)}<br>
            복습 방법: ${escapeHtml(REVIEW_METHODS[g.area] || REVIEW_METHODS.unknown)}</p>
          `;
        }).join("");
      }

      function renderZoneTable(groups) {
        return `
          <table>
            <thead>
              <tr>
                <th>구간</th>
                <th>정답 수</th>
                <th>점수</th>
                <th>정답률</th>
                <th>복습할 문항</th>
              </tr>
            </thead>
            <tbody>
              ${groups.map((g) => {
                const pct = percent(g.earned, g.possible, g.correct, g.items.length);
                const wrongNums = g.wrongOrBlank.map((item) => item.question_number).join(", ");
                return `<tr>
                  <td>${escapeHtml(g.label)}</td>
                  <td>${g.correct} / ${g.items.length}</td>
                  <td>${g.earned} / ${g.possible || "-"}</td>
                  <td>${pct}%</td>
                  <td>${escapeHtml(wrongNums || "없음")}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        `;
      }

      function renderWrongItems(items, onlyBlank) {
        const result = window.__TOPIK2_LAST_DIAGNOSIS_RESULT__;
        const list = items.filter((item) => onlyBlank ? !item.student_answer : (item.student_answer && !item.is_correct));
        if (!list.length) return `<p>${onlyBlank ? "미응답 문항이 없습니다." : "오답 문항이 없습니다."}</p>`;
        return `<div class="wrong-grid">${list.map((item) => {
          return `
            <div class="wrong-card">
              <strong>${escapeHtml(item.question_number)}번 ${escapeHtml(AREA_LABELS[itemArea(item)] || "")}</strong><br>
              출처: ${escapeHtml(item.source_round || "")}회 원문항 ${escapeHtml(item.original_question_number || item.question_number)}번<br>
              <span class="answer-line">내 답 ${escapeHtml(optionText(item.options, item.student_answer))}</span><br>
              <span class="correct-line">정답 ${escapeHtml(optionText(item.options, item.correct_answer))}</span>
            </div>
          `;
        }).join("")}</div>`;
      }

      function originalReviewKey(item) {
        if (item && typeof item.review_source_original_key === "string" && item.review_source_original_key.includes("|")) {
          return item.review_source_original_key;
        }
        const round = String(item?.source_round || item?.review_source_round || item?.generated_exam_round || item?.round || "").trim();
        const originalNumber = Number(item?.original_question_number || item?.review_source_question_number || item?.question_number || 0);
        return round && originalNumber ? `${round}|${originalNumber}` : "";
      }

      function sourceResultId(result) {
        if (!result) return "";
        const explicit = result.result_id || result.exam_result_id || result.review_source_id || result.wrong_review_source_id || "";
        if (explicit) return String(explicit);
        const base = [
          result.submitted_at || "",
          result.started_at || "",
          result.test_name || result.generated_exam_label || "",
          result.generated_exam_mode || "",
          result.generated_exam_round || result.source_round || "",
          result.student_name || "",
          result.student_phone || "",
          result.total_questions || "",
          result.earned_points || "",
          result.correct_count || "",
          result.unanswered_count || ""
        ].join("|");
        return base || "topik2-current-diagnosis";
      }

      function candidateReviewKeys(item) {
        const keys = new Set();
        if (!item) return keys;
        if (item.id) keys.add(String(item.id));
        if (item.review_source_original_key) keys.add(String(item.review_source_original_key));
        const originalKey = originalReviewKey(item);
        if (originalKey) keys.add(originalKey);

        const round = String(item.source_round || item.review_source_round || item.generated_exam_round || item.round || "").trim();
        const originalNumber = Number(item.original_question_number || item.review_source_question_number || 0);
        const displayNumber = Number(item.question_number || 0);
        if (round && originalNumber) keys.add(`${round}|${originalNumber}`);
        if (round && displayNumber) keys.add(`${round}|display:${displayNumber}`);
        if (displayNumber) {
          keys.add(`display:${displayNumber}`);
          keys.add(`qn:${displayNumber}`);
        }
        return keys;
      }

      function normalizeWrongReviewProgress(parsed, currentSourceId) {
        const empty = WRONG_REVIEW_EMPTY_PROGRESS(currentSourceId);
        if (!parsed || typeof parsed !== "object" || !currentSourceId) return empty;

        const storedSourceId = String(parsed.sourceId || parsed.source_id || "");
        const scopeVersion = String(parsed.scopeVersion || parsed.scope_version || "");
        const currentResultOnly = parsed.currentResultOnly === true;

        // 핵심 보정:
        // 과거 보고서에서 남은 legacy progress는 sourceId가 우연히 같아도 배지 표시 기준으로 쓰지 않습니다.
        // 현재 index에서 오답 다시 풀기 버튼을 눌러 새로 만든 v3 progress만 인정합니다.
        if (storedSourceId !== currentSourceId) return empty;
        if (scopeVersion !== WRONG_REVIEW_SCOPE_VERSION && !currentResultOnly) return empty;

        const resolvedKeys = []
          .concat(Array.isArray(parsed.resolvedKeys) ? parsed.resolvedKeys : [])
          .concat(Array.isArray(parsed.solvedKeys) ? parsed.solvedKeys : [])
          .concat(Array.isArray(parsed.resolved_keys) ? parsed.resolved_keys : [])
          .map(String)
          .filter(Boolean);

        const solvedNumbers = []
          .concat(Array.isArray(parsed.solvedNumbers) ? parsed.solvedNumbers : [])
          .concat(Array.isArray(parsed.solved_numbers) ? parsed.solved_numbers : [])
          .map((value) => Number(value))
          .filter((value) => Number.isFinite(value) && value > 0);

        return {
          scopeVersion: WRONG_REVIEW_SCOPE_VERSION,
          currentResultOnly: true,
          sourceId: currentSourceId,
          resolvedKeys,
          solvedNumbers,
          attempts: Array.isArray(parsed.attempts) ? parsed.attempts : []
        };
      }

      function getWrongReviewProgress(result) {
        const currentSourceId = sourceResultId(result || window.__TOPIK2_LAST_DIAGNOSIS_RESULT__);
        try {
          const raw = localStorage.getItem("topik2_wrong_review_progress") || sessionStorage.getItem("topik2_wrong_review_progress");
          const parsed = raw ? JSON.parse(raw) : {};
          return normalizeWrongReviewProgress(parsed, currentSourceId);
        } catch (error) {
          return WRONG_REVIEW_EMPTY_PROGRESS(currentSourceId);
        }
      }

      function saveWrongReviewProgress(progress) {
        const payload = {
          scopeVersion: WRONG_REVIEW_SCOPE_VERSION,
          currentResultOnly: true,
          sourceId: progress.sourceId || "",
          resolvedKeys: Array.isArray(progress.resolvedKeys) ? progress.resolvedKeys.map(String) : [],
          solvedNumbers: Array.isArray(progress.solvedNumbers) ? progress.solvedNumbers : [],
          attempts: Array.isArray(progress.attempts) ? progress.attempts : []
        };
        localStorage.setItem("topik2_wrong_review_progress", JSON.stringify(payload, null, 2));
        sessionStorage.setItem("topik2_wrong_review_progress", JSON.stringify(payload, null, 2));
        return payload;
      }

      function setWrongReviewSourceScope(result) {
        const sourceId = sourceResultId(result);
        localStorage.setItem("topik2_wrong_review_source_id", sourceId);
        sessionStorage.setItem("topik2_wrong_review_source_id", sourceId);

        // STEP14:
        // 오답 다시 풀기를 다시 시작할 때 기존 진행 기록을 지우면,
        // 이미 맞힌 문항이 다음 오답풀이에 다시 나타난다.
        // 따라서 현재 result와 scopeVersion이 일치하는 진행 기록은 보존한다.
        let rawProgress = null;
        try {
          rawProgress = localStorage.getItem("topik2_wrong_review_progress") ||
            sessionStorage.getItem("topik2_wrong_review_progress");
          const parsed = rawProgress ? JSON.parse(rawProgress) : null;
          const isValidCurrentProgress = parsed &&
            parsed.scopeVersion === WRONG_REVIEW_SCOPE_VERSION &&
            parsed.currentResultOnly === true &&
            String(parsed.sourceId || "") === String(sourceId || "");

          if (!rawProgress) {
            saveWrongReviewProgress(WRONG_REVIEW_EMPTY_PROGRESS(sourceId));
          } else if (!isValidCurrentProgress) {
            // 구버전/다른 시험 기록은 읽을 때 무시되므로 여기서 굳이 덮어쓰지 않는다.
            // 덮어쓰면 직전 오답풀이에서 저장된 해결 문항이 사라질 수 있다.
          }
        } catch (error) {
          if (!rawProgress) saveWrongReviewProgress(WRONG_REVIEW_EMPTY_PROGRESS(sourceId));
        }
        return sourceId;
      }

      function isWrongReviewResolved(result, item) {
        const progress = getWrongReviewProgress(result);
        const resolved = new Set(progress.resolvedKeys || []);
        for (const key of candidateReviewKeys(item)) {
          if (resolved.has(key)) return true;
        }
        const displayNumber = Number(item?.question_number || 0);
        return Boolean(displayNumber && Array.isArray(progress.solvedNumbers) && progress.solvedNumbers.includes(displayNumber));
      }

      function getOriginalWrongItems(result) {
        return normalizeItems(result).filter((item) => !item.is_correct);
      }

      function getResolvedWrongItems(result) {
        return getOriginalWrongItems(result).filter((item) => isWrongReviewResolved(result, item));
      }

      function getUnresolvedWrongItems(result) {
        return getOriginalWrongItems(result).filter((item) => !isWrongReviewResolved(result, item));
      }

      function renderReviewProgressBox(result) {
        const originalWrongItems = getOriginalWrongItems(result);
        const resolvedItems = getResolvedWrongItems(result);
        const unresolvedItems = getUnresolvedWrongItems(result);
        const progress = getWrongReviewProgress(result);
        const lastAttempt = Array.isArray(progress.attempts) && progress.attempts.length
          ? progress.attempts[progress.attempts.length - 1]
          : null;
        const originalNums = originalWrongItems.map((item) => item.question_number).join(", ") || "없음";
        const resolvedNums = resolvedItems.map((item) => item.question_number).join(", ") || "없음";
        const unresolvedNums = unresolvedItems.map((item) => item.question_number).join(", ") || "없음";
        const lastText = lastAttempt
          ? `${formatDate(lastAttempt.submittedAt)} · 이번 차감 ${lastAttempt.correctedCount || 0}문항`
          : "아직 오답 풀이 기록이 없습니다.";

        return `
          <section class="review-progress-box">
            <div class="review-progress-title">
              <span>오답 다시 풀기 진행 현황</span>
              <span>${escapeHtml(resolvedItems.length)} / ${escapeHtml(originalWrongItems.length)} 해결</span>
            </div>
            <div class="review-progress-grid">
              <div class="review-progress-card">
                <div class="label">원 진단 오답·미응답</div>
                <div class="value">${escapeHtml(originalWrongItems.length)}</div>
              </div>
              <div class="review-progress-card">
                <div class="label">오답풀이 해결</div>
                <div class="value">${escapeHtml(resolvedItems.length)}</div>
              </div>
              <div class="review-progress-card">
                <div class="label">남은 오답풀이</div>
                <div class="value">${escapeHtml(unresolvedItems.length)}</div>
              </div>
              <div class="review-progress-card">
                <div class="label">오답풀이 횟수</div>
                <div class="value">${escapeHtml(Array.isArray(progress.attempts) ? progress.attempts.length : 0)}</div>
              </div>
            </div>
            <div class="review-progress-note">
              오답 다시 풀기 결과는 이 진행 현황에만 반영됩니다. 처음 시험의 점수, 정답 수, 유형별 진단, 오답 문항 목록은 변경하지 않습니다.
            </div>
            <div class="review-progress-list">
              원 진단 오답·미응답: ${escapeHtml(originalNums)}<br>
              해결된 오답풀이: ${escapeHtml(resolvedNums)}<br>
              남은 오답풀이: ${escapeHtml(unresolvedNums)}<br>
              최근 오답풀이: ${escapeHtml(lastText)}
            </div>
          </section>
        `;
      }

      function getReviewVisibleItems(result) {
        // STEP68: 오답 다시 풀기 버튼 수와 실제 오답풀이 화면 수를 같은 기준으로 맞춘다.
        // listening-test의 오답 다시 풀기 화면은 현재 남은 오답·미응답 문항만 생성한다.
        // 따라서 진단 보고서 버튼에서도 세트의 맞은 짝문항을 추가 계산하지 않는다.
        return getUnresolvedWrongItems(result);
      }
      function renderReport(result) {
        window.__TOPIK2_LAST_DIAGNOSIS_RESULT__ = result;
        const stats = makeStats(result);
        const groups = groupStats(stats.items);
        const level = levelByScore(stats.score100);
        const weak = weakGroups(groups);
        const weakSummary = weak.length
          ? `현재 가장 보완이 필요한 유형은 ${weak.map((g) => `${g.label} ${g.pct}%`).join(", ")}입니다.`
          : "분석할 약점 유형이 없습니다.";
        const originalWrongItems = getOriginalWrongItems(result);
        const unresolvedWrongItems = getUnresolvedWrongItems(result);
        const originalWrongNums = originalWrongItems.map((item) => item.question_number);
        const unresolvedWrongNums = unresolvedWrongItems.map((item) => item.question_number);
        const strongGroups = groups
          .map((g) => ({ ...g, pct: percent(g.earned, g.possible, g.correct, g.items.length) }))
          .filter((g) => g.pct >= 70 && g.items.length > 0);
        const started = formatDate(result.started_at);
        const submitted = formatDate(result.submitted_at);
        const testName = result.test_name || result.generated_exam_label || "TOPIK II 듣기";
        const round = result.generated_exam_round || result.source_round || "103";

        const wrongReviewBtn = document.getElementById("wrongReviewBtn");
        if (wrongReviewBtn) {
          const visibleReviewCount = unresolvedWrongItems.length;

          wrongReviewBtn.classList.toggle("disabled", visibleReviewCount === 0);
          wrongReviewBtn.title = visibleReviewCount > 0
            ? `실제 오답 다시 풀기 화면과 같은 기준: 남은 오답·미응답 ${visibleReviewCount}문항`
            : "";
        }

        document.getElementById("report").innerHTML = `

            <div class="summary-card"><div class="label">듣기 점수</div><div class="value">${escapeHtml(stats.earned)}점</div></div>

            <div class="summary-card"><div class="label">미응답</div><div class="value">${escapeHtml(stats.unansweredCount)}</div></div>
          </div>

          <section class="level-box">
            <h2>${escapeHtml(level.title)}</h2>
            <p>듣기 점수 구간: ${escapeHtml(level.range)}</p>
            <p>예상 수준: ${escapeHtml(level.expected)}</p>
            <p>안정권 해석: ${escapeHtml(level.stable)}</p>
            <p>다음 목표: ${escapeHtml(level.goal)}</p>
          </section>

          <section class="notice-box">
            <strong>공식 급수 안내</strong><br>
            이 보고서는 TOPIK II 듣기 영역만 기준으로 한 예상 수준입니다. 공식 TOPIK II 급수는 듣기·쓰기·읽기 총점 기준으로 결정되므로, 이 결과만으로 공식 급수를 확정할 수 없습니다.
          </section>

          ${renderReviewProgressBox(result)}

          <h3 class="section-title">시험 정보</h3>
          <table>
            <tbody>
              <tr><th>시험명</th><td>${escapeHtml(testName)}</td></tr>
              <tr><th>응시자</th><td>${escapeHtml(result.student_name || "-")}</td></tr>
              <tr><th>전화번호</th><td>${escapeHtml(result.student_phone || "-")}</td></tr>
              <tr><th>시험 범위</th><td>${escapeHtml(result.test_scope || result.generated_exam_mode || "-")}</td></tr>
              <tr><th>출제 방식</th><td>${escapeHtml(result.generated_exam_label || testName)}</td></tr>
              <tr><th>출제 회차</th><td>${escapeHtml(round)}</td></tr>
              <tr><th>응시 시간</th><td>${escapeHtml(started)} ~ ${escapeHtml(submitted)}</td></tr>
              <tr><th>문항 수</th><td>${escapeHtml(stats.totalQuestions)}문항</td></tr>
            </tbody>
          </table>

          <h3 class="section-title">유형별 득점 그래프</h3>
          <p>아래 그래프는 TOPIK II 듣기 대표 유형으로 묶어 계산한 득점률입니다. 막대가 짧은 유형일수록 우선 복습이 필요한 영역입니다.</p>
          <div class="graph-list">${renderGraph(groups)}</div>

          <h3 class="section-title">유형별 약점 요약</h3>
          <p>${escapeHtml(weakSummary)}</p>
          <p>관련 오답·미응답 문항: ${escapeHtml(originalWrongNums.join(", ") || "없음")}</p>

          <h3 class="section-title">우선 복습 순서</h3>
          <div class="study-box">${renderPriority(groups)}</div>

          <h3 class="section-title">오늘 할 일</h3>
          <div class="study-box">
            1. 1순위 유형의 오답 오디오를 다시 듣고, 정답이 되는 표현을 한 줄로 적습니다.<br>
            2. 선택지의 핵심 명사·동사·수치에 먼저 표시한 뒤 다시 듣습니다.<br>
            3. 긴 대화·담화는 인물, 이유, 결과, 태도 표현을 표로 정리합니다.
          </div>

          <h3 class="section-title">핵심 구간 요약</h3>
          ${renderZoneTable(groups)}

          <h3 class="section-title">강점·약점 영역</h3>
          <div class="two-col">
            <div>
              <h4>강점 영역</h4>
              <div class="pill-wrap">
                ${strongGroups.length ? strongGroups.map((g) => `<span class="pill" style="background:#e8fff0;color:#087a32;">${escapeHtml(g.label)} ${g.pct}%</span>`).join("") : `<span class="pill">아직 뚜렷한 강점 영역이 없습니다.</span>`}
              </div>
            </div>
            <div>
              <h4>약점 영역</h4>
              <div class="pill-wrap">
                ${weak.map((g) => `<span class="pill">${escapeHtml(g.label)} ${g.wrongOrBlank.length}문제</span>`).join("") || `<span class="pill">약점 영역 없음</span>`}
              </div>
            </div>
          </div>

          <h3 class="section-title">학습 처방</h3>
          <div class="study-box">
            현재 듣기 기준 예상 수준은 '${escapeHtml(level.title)}'입니다. 다음 목표는 ${escapeHtml(level.goal)}입니다.
            우선 복습 유형은 ${escapeHtml(weak.map((g) => g.label).join(", ") || "없음")}입니다.<br>
            오답·미응답 관리: ${escapeHtml(originalWrongNums.join(", ") || "없음")} 문항을 먼저 복습하세요.<br>
            2주 계획: 1~3일차 오답 근거 표시 → 4~6일차 약점 유형 복습 → 7일차 전체 재풀이 → 8~13일차 새 랜덤 시험 반복 → 14일차 보고서 비교.
          </div>

          <h3 class="section-title">오답 문항</h3>
          ${renderWrongItems(stats.items, false)}

          <h3 class="section-title">미응답 문항</h3>
          ${renderWrongItems(stats.items, true)}
        `;

        window.__TOPIK2_LAST_DIAGNOSIS_RESULT__ = result;
      }

      function parseMaybeResult(raw) {
        if (!raw) return null;
        let parsed;
        try {
          parsed = JSON.parse(raw);
        } catch (error) {
          return null;
        }

        if (parsed && Array.isArray(parsed.items)) return parsed;
        if (parsed && parsed.result && Array.isArray(parsed.result.items)) return parsed.result;
        if (parsed && parsed.data && Array.isArray(parsed.data.items)) return parsed.data;
        return null;
      }

      function findStoredResult() {
        for (const storage of [localStorage, sessionStorage]) {
          for (const key of REPORT_KEYS) {
            const result = parseMaybeResult(storage.getItem(key));
            if (result) return { key, result };
          }

          for (let i = 0; i < storage.length; i += 1) {
            const key = storage.key(i);
            if (!key) continue;
            const lower = key.toLowerCase();
            if (!(lower.includes("topik2") || lower.includes("listening") || lower.includes("result"))) continue;
            const result = parseMaybeResult(storage.getItem(key));
            if (result) return { key, result };
          }
        }
        return null;
      }

      function renderNoResult(message) {
        document.getElementById("report").innerHTML = `
          <div class="no-result">
            <h2>아직 결과가 없습니다.</h2>
            <p>${escapeHtml(message || "브라우저 저장 결과를 찾지 못했습니다.")}</p>
            <p>시험 제출 직후라면 이전 탭의 결과 요약 화면에서 <strong>진단 보고서 보기</strong>를 다시 눌러 주세요.</p>
            <p>또는 result.json 파일을 직접 선택해서 불러올 수 있습니다.</p>
            <input id="fileInput" type="file" accept="application/json,.json">
            <button id="manualLoadBtn" class="ghost" type="button">브라우저 저장 결과 다시 찾기</button>
          </div>
        `;

        document.getElementById("manualLoadBtn").addEventListener("click", loadReport);
        document.getElementById("fileInput").addEventListener("change", async (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) return;
          try {
            const text = await file.text();
            const result = parseMaybeResult(text);
            if (!result) {
              renderNoResult("선택한 파일이 TOPIK II 듣기 result.json 형식이 아닙니다.");
              return;
            }
            renderReport(result);
          } catch (error) {
            renderNoResult("파일을 읽는 중 오류가 발생했습니다: " + error.message);
          }
        });
      }

      function loadReport() {
        try {
          const found = findStoredResult();
          if (!found) {
            renderNoResult("localStorage 또는 sessionStorage에서 TOPIK II 듣기 결과를 찾지 못했습니다.");
            return;
          }
          renderReport(found.result);
        } catch (error) {
          console.error(error);
          renderNoResult("진단 보고서 생성 중 오류가 발생했습니다: " + error.message);
        }
      }

      document.getElementById("printBtn").addEventListener("click", () => window.print());

      function buildWrongReviewItemsForStorage(result) {
        return getReviewVisibleItems(result);
      }

      document.getElementById("wrongReviewBtn").addEventListener("click", () => {
        const result = window.__TOPIK2_LAST_DIAGNOSIS_RESULT__;
        if (!result) {
          alert("먼저 결과를 불러와 주세요.");
          return;
        }

        const wrongItems = getUnresolvedWrongItems(result);
        if (!wrongItems.length) {
          alert("남은 오답 또는 미응답 문항이 없습니다.");
          return;
        }

        const reviewItems = buildWrongReviewItemsForStorage(result);
        setWrongReviewSourceScope(result);
        localStorage.setItem("topik2_wrong_review_source_result", JSON.stringify(result));
        sessionStorage.setItem("topik2_wrong_review_source_result", JSON.stringify(result));
        localStorage.setItem("topik2_wrong_review_items", JSON.stringify(reviewItems));
        sessionStorage.setItem("topik2_wrong_review_items", JSON.stringify(reviewItems));
        localStorage.setItem("topik2_wrong_review_started_at", new Date().toISOString());

        const url = "../listening-test/index.html?mode=wrong-review&v=topik93_step14_wrong_review_decrement_fix";
        window.open(url, "_blank");
      });

      window.addEventListener("DOMContentLoaded", () => {
        setTimeout(loadReport, 50);
      });
    })();
  </script>
